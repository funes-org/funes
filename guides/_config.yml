title: Funes
description: Tutorials and guides for the Funes event sourcing framework

baseurl: ""
url: https://docs.funes.org

theme: just-the-docs
color_scheme: funes

permalink: pretty

nav_external_links:
  - title: funes.org
    url: https://funes.org
  - title: API Reference
    url: https://rubydoc.info/gems/funes-rails

mixpanel_token: ""

mermaid:
  version: "10.9.1"

callouts:
  note:
    title: Note
    color: blue
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: red

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - _config_env.yml
